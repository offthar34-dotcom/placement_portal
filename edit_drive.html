{% extends "base.html" %}

{% block content %}

<h2>✏️ Edit Drive</h2>

<a href="/company" class="btn btn-secondary mb-4">← Back to Drives</a>

<div class="card">
<div class="card-body">

<form method="POST">

<h5 class="mb-4">📋 Drive Details</h5>

<div class="row">
<div class="col-md-6">
<div class="form-group mb-3">
<label class="form-label">Job Role / Position</label>
<input name="job_role" value="{{drive.job_role}}" class="form-control" placeholder="e.g., Software Engineer" required>
</div>
</div>

<div class="col-md-6">
<div class="form-group mb-3">
<label class="form-label">Salary</label>
<input name="salary" value="{{drive.salary}}" class="form-control" placeholder="e.g., 8 or 8 LPA" required>
</div>
</div>
</div>

<hr class="my-4">

<h5 class="mb-4">✅ Eligibility Criteria</h5>

<div class="row">
<div class="col-md-6">
<div class="form-group mb-3">
<label class="form-label">Minimum 10th Percentage</label>
<input name="min_tenth_percentage" type="number" step="0.01" value="{{drive.min_tenth_percentage}}" class="form-control" placeholder="e.g., 60">
</div>
</div>

<div class="col-md-6">
<div class="form-group mb-3">
<label class="form-label">Minimum 12th Percentage</label>
<input name="min_twelfth_percentage" type="number" step="0.01" value="{{drive.min_twelfth_percentage}}" class="form-control" placeholder="e.g., 65">
</div>
</div>

<div class="col-md-6">
<div class="form-group mb-3">
<label class="form-label">Minimum CGPA (out of 10)</label>
<input name="min_cgpa" type="number" step="0.01" value="{{drive.min_cgpa}}" class="form-control" placeholder="e.g., 7.0">
</div>
</div>

<div class="col-md-6">
<div class="form-group mb-3">
<label class="form-label">Required Skills</label>
<input name="required_skills" value="{{drive.required_skills}}" class="form-control" placeholder="e.g., Python, SQL, AWS">
</div>
</div>
</div>

<div class="mt-4">
<button type="submit" class="btn btn-success btn-lg">💾 Save Changes</button>
<a href="/company" class="btn btn-secondary btn-lg">Cancel</a>
</div>

</form>

</div>
</div>

{% endblock %}
