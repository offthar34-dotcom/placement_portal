<!DOCTYPE html>
<html>
<head>
<title>Company Dashboard</title>
</head>

<body>

<h2>Company Dashboard</h2>

<a href="/logout">Logout</a>

<hr>

<a href="/create_drive">Create Placement Drive</a>

<hr>

<h3>Your Placement Drives</h3>

<table border="1">

<tr>
<th>Job Role</th>
<th>Deadline</th>
<th>Status</th>
<th>Applicants</th>
</tr>

{% for drive in drives %}

<tr>

<td>{{drive.job_title}}</td>
<td>{{drive.deadline}}</td>
<td>{{drive.status}}</td>

<td>
<a href="/view_applications/{{drive.id}}">
View Applicants
</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
